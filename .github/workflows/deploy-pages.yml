# Phase 5.5 — Deploy the Astro site to GitHub Pages via GitHub Actions.
#
# Setting the repo's Pages source to "GitHub Actions" (Settings → Pages → Build and
# deployment → Source) makes this workflow the deployer and STOPS the legacy Jekyll
# `pages-build-deployment` builds that have been failing (and emailing) since the repo
# became an Astro project.
#
# This serves the SAME build as Cloudflare on `praveer09.github.io`, including the
# redirect stub pages at the old `/category/date/slug/` paths. Every page emits an
# absolute canonical to https://praveergupta.in (astro.config `site`), so the duplicated
# home/listing pages are SEO-safe (Option A in docs/plan/phase-5-dns-cutover.md).

name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # version is read from the "packageManager" field in package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (prebuild generates redirects + stubs, postbuild verifies)
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
