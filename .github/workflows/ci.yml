# Phase 7.2 + 7.3 — CI quality gate and a non-blocking link safety net.
#
# `verify` (blocking) lints, typechecks and builds on every PR and on push to
# master. The build's `postbuild` step runs `scripts/verify-redirects.mjs` and
# `scripts/verify-diagrams.mjs`, so redirect/stub integrity AND diagram-render
# completeness are enforced as blocking gates here.
#
# The build renders ```mermaid blocks to static SVG via rehype-mermaid, which
# needs headless Chromium — installed (and cached) before the build below.
# `verify-diagrams` then asserts every diagram actually rendered, so a Mermaid
# regression fails the job before the artifact is deployed.
#
# `link-check` (non-blocking) downloads the built `dist/` from `verify` and runs
# lychee over it to catch broken links inside post content — something the
# redirect validator never inspects. It is `continue-on-error`, so a flaky
# external link reports a red job for awareness without blocking the PR.
#
# `lighthouse` (non-blocking) runs Lighthouse against the built `dist/` (served
# locally by the action) and surfaces performance/a11y/SEO/best-practices scores
# plus a shareable report URL. No thresholds are asserted yet — it is purely for
# learning the budgets, so it is `continue-on-error` too.
#
# `deploy` (build once, deploy many) uploads the SAME `dist/` artifact that
# `verify` built+validated straight to Cloudflare Pages via Direct Upload
# (wrangler), so Cloudflare serves exactly the bytes we tested instead of
# rebuilding from source. Push to master ->
# production; pull requests -> a Cloudflare preview deployment. Requires repo
# secrets CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID, and Cloudflare's own
# Git-integration build must be turned OFF to avoid double deploys.

name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        # version is read from the "packageManager" field in package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium (for build-time Mermaid rendering)
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Upload built site
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 7

  link-check:
    name: Link safety net (non-blocking)
    needs: verify
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Download built site
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # --offline checks only internal/local links (deterministic, no
          # network). External link-rot on archival posts would otherwise create
          # permanent noise; --root-dir (absolute) resolves root-relative links
          # (e.g. /blog/) against the built site root. --include-fragments also
          # verifies in-page #anchor targets (e.g. table-of-contents links).
          args: >-
            --no-progress --offline --include-fragments
            --root-dir ${{ github.workspace }}/dist
            'dist/**/*.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lighthouse:
    name: Lighthouse (non-blocking)
    needs: verify
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        # brings lighthouserc.json into the workspace (dist is gitignored)

      - name: Download built site
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          # collect config (staticDistDir + URLs + runs) lives in lighthouserc.json
          configPath: ./lighthouserc.json
          # publish each report to temporary public storage and print its URL
          temporaryPublicStorage: true
          # also keep the raw results as a downloadable workflow artifact
          uploadArtifacts: true

  deploy:
    name: Deploy to Cloudflare Pages
    needs: verify
    runs-on: ubuntu-latest
    # Only deploy for pushes to this repo or same-repo PRs — fork PRs and
    # Dependabot PRs run without access to the Cloudflare secrets (Dependabot
    # uses a separate, restricted secret store), so wrangler would fail with
    # "Not logged in." Skip the deploy for them; the build/verify gate still runs.
    if: ${{ github.actor != 'dependabot[bot]' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
    steps:
      - name: Download built site
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Deploy to Cloudflare Pages (Direct Upload)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin the Wrangler major so a future release can't silently change
          # Pages deploy behaviour.
          wranglerVersion: '4'
          # github.head_ref is set on pull_request (the source branch -> preview);
          # on push to master it is empty so ref_name (master) -> production.
          command: >-
            pages deploy dist
            --project-name=praveergupta
            --branch=${{ github.head_ref || github.ref_name }}
