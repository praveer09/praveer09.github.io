version: 2
updates:
  # JavaScript/TypeScript dependencies (Astro, Tailwind, tooling)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
      prefix-development: deps-dev
    groups:
      # One PR per week for all non-breaking updates, kept separate for prod vs dev.
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  # Versions pinned in .github/workflows/*.yml (checkout, setup-node, lychee, etc.)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
    groups:
      actions-all:
        patterns:
          - "*"
